<div class="task-header">
  <h2>My Tasks</h2>
  <button routerLink="/tasks/new" class="add-btn">+ New Task</button>
</div>

<div class="filter-buttons">
  <button (click)="filter='all'" [class.active]="filter==='all'">All</button>
  <button (click)="filter='pending'" [class.active]="filter==='pending'">Pending</button>
  <button (click)="filter='completed'" [class.active]="filter==='completed'">Completed</button>
</div>

<div class="task-list">
  @for (task of filteredTasks; track task._id) {
    <div class="task-card" [class.completed]="task.completed">
      <div class="task-info">
        <h3>{{ task.title }}</h3>
        <p>{{ task.description }}</p>
      </div>
      <div class="task-actions">
        <button class="complete-btn" (click)="toggleComplete(task)">
          {{ task.completed ? '↺ Undo' : '✓ Complete' }}
        </button>
        <button class="edit-btn" [routerLink]="['/tasks/edit', task._id]">✏️ Edit</button>
        <button class="delete-btn" (click)="deleteTask(task._id)">🗑 Delete</button>
      </div>
    </div>
  } @empty {
    <p class="no-tasks">No tasks yet. Create one!</p>
  }
</div>
